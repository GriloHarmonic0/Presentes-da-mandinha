<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mandinha S2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0b18; /* Um fundo ainda mais escuro para destacar o brilho */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #mensagem {
            position: absolute;
            bottom: 10%; /* Ajustado um pouco para baixo */
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 100, 0.8), 2px 2px 10px rgba(0, 0, 0, 0.8);
            text-align: center;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    
    <div id="mensagem">Para Mandinha S2 ❤️</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Configuração básica da cena
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Grupo principal que vai conter o coração e os brilhos
        const presentGroup = new THREE.Group();
        scene.add(presentGroup);

        // --- 1. Criando o Coração em 3D ---
        const heartShape = new THREE.Shape();
        const x = 0, y = 0;
        // Desenha a forma do coração
        heartShape.moveTo( x + 5, y + 5 );
        heartShape.bezierCurveTo( x + 5, y + 5, x + 4, y, x, y );
        heartShape.bezierCurveTo( x - 6, y, x - 6, y + 7,x - 6, y + 7 );
        heartShape.bezierCurveTo( x - 6, y + 11, x - 3, y + 15.4, x + 5, y + 19 );
        heartShape.bezierCurveTo( x + 12, y + 15.4, x + 16, y + 11, x + 16, y + 7 );
        heartShape.bezierCurveTo( x + 16, y + 7, x + 16, y, x + 10, y );
        heartShape.bezierCurveTo( x + 7, y, x + 5, y + 5, x + 5, y + 5 );

        // Configurações de profundidade (extrusão)
        const extrudeSettings = { depth: 2, bevelEnabled: true, bevelSegments: 3, steps: 2, bevelSize: 0.5, bevelThickness: 0.5 };
        const heartGeometry = new THREE.ExtrudeGeometry( heartShape, extrudeSettings );
        
        // Centraliza a geometria do coração para que a rotação ocorra pelo meio
        heartGeometry.center();
        
        // Material rosa/vermelho brilhante
        const heartMaterial = new THREE.MeshPhongMaterial({ 
            color: 0xff69b4, // Rosa choque (você pode mudar para vermelho: 0xff0000)
            shininess: 90, 
            side: THREE.DoubleSide 
        });
        const heart = new THREE.Mesh(heartGeometry, heartMaterial);
        
        // Ajusta a rotação inicial para o coração ficar de frente
        heart.rotation.x = Math.PI; // Vira de ponta cabeça para o formato correto
        presentGroup.add(heart);

        // --- 2. Adicionando os Brilhos Amarelos ao Redor ---
        const sparkleCount = 500; // Quantidade de brilhos
        const sparklePositions = new Float32Array(sparkleCount * 3);
        const sparkleGeometry = new THREE.BufferGeometry();

        // Gera posições aleatórias para os brilhos em uma esfera ao redor do coração
        for (let i = 0; i < sparkleCount; i++) {
            const radius = 12; // Raio da distribuição
            const phi = Math.random() * Math.PI * 2;
            const theta = Math.random() * Math.PI;
            const r = radius * Math.sqrt(Math.random()); // Distribuição uniforme no volume

            sparklePositions[i * 3] = r * Math.sin(theta) * Math.cos(phi);
            sparklePositions[i * 3 + 1] = r * Math.sin(theta) * Math.sin(phi);
            sparklePositions[i * 3 + 2] = r * Math.cos(theta);
        }
        sparkleGeometry.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));

        // Material para os brilhos (pequenos pontos amarelos transparentes)
        const sparkleMaterial = new THREE.PointsMaterial({
            color: 0xffffcc, // Amarelo bem claro
            size: 0.15,
            transparent: true,
            blending: THREE.AdditiveBlending, // Brilho que se soma, criando o efeito de luz
            depthWrite: false // Evita artefatos de renderização
        });
        const sparkles = new THREE.Points(sparkleGeometry, sparkleMaterial);
        presentGroup.add(sparkles);

        // --- 3. Iluminação ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);

        // --- 4. Câmera ---
        camera.position.z = 25; // Afastada para ver a distribuição de brilhos
        camera.position.y = 5;
        camera.lookAt(0, 0, 0);

        // --- 5. Animação ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Faz o grupo (coração + brilhos) girar no eixo Y
            presentGroup.rotation.y += 0.01; 
            
            // Um leve movimento de flutuação
            presentGroup.position.y = Math.sin(Date.now() * 0.001) * 0.5;

            // Faz os brilhos pulsarem levemente mudando o tamanho
            sparkleMaterial.size = 0.15 + Math.sin(Date.now() * 0.005) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        // --- 6. Responsividade ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
