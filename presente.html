<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mandinha S2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0b18; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #mensagem {
            position: absolute;
            bottom: 10%; 
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 100, 0.8), 2px 2px 10px rgba(0, 0, 0, 0.8);
            text-align: center;
            letter-spacing: 2px;
            z-index: 10;
        }
    </style>
</head>
<body>
    
    <div id="mensagem">Para Mandinha S2 ❤️</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Configuração básica da cena
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Grupo principal que vai conter o coração, o gato e os brilhos
        const presentGroup = new THREE.Group();
        scene.add(presentGroup);

        // --- 1. Criando o Coração em 3D mais arredondado ---
        const heartShape = new THREE.Shape();
        const x = 0, y = 0;
        
        heartShape.moveTo( x + 5, y + 5 );
        heartShape.bezierCurveTo( x + 5, y + 5, x + 4, y, x, y );
        heartShape.bezierCurveTo( x - 6, y, x - 6, y + 7,x - 6, y + 7 );
        heartShape.bezierCurveTo( x - 6, y + 11, x - 3, y + 15.4, x + 5, y + 19 );
        heartShape.bezierCurveTo( x + 12, y + 15.4, x + 16, y + 11, x + 16, y + 7 );
        heartShape.bezierCurveTo( x + 16, y + 7, x + 16, y, x + 10, y );
        heartShape.bezierCurveTo( x + 7, y, x + 5, y + 5, x + 5, y + 5 );

        const extrudeSettings = { depth: 3, bevelEnabled: true, bevelSegments: 4, steps: 2, bevelSize: 1, bevelThickness: 1 };
        const heartGeometry = new THREE.ExtrudeGeometry( heartShape, extrudeSettings );
        
        heartGeometry.center();
        
        const heartMaterial = new THREE.MeshPhongMaterial({ 
            color: 0xff4d88, // Rosa vibrante
            shininess: 100, 
            side: THREE.DoubleSide 
        });
        const heart = new THREE.Mesh(heartGeometry, heartMaterial);
        
        // Virando o coração e escalando para ficar mais "gordinho/redondo"
        heart.rotation.x = Math.PI; 
        heart.scale.set(1.3, 1.1, 1.2); 
        presentGroup.add(heart);

        // --- 2. Criando o Gatinho em 3D no topo ---
        const catGroup = new THREE.Group();
        
        // Material base do gatinho (cor creme/bege)
        const catMaterial = new THREE.MeshPhongMaterial({ color: 0xffeebb, shininess: 30 });
        
        // Corpo do gato
        const bodyGeo = new THREE.SphereGeometry(2, 32, 32);
        const body = new THREE.Mesh(bodyGeo, catMaterial);
        body.scale.set(1, 0.8, 1.2);
        catGroup.add(body);

        // Cabeça do gato
        const headGeo = new THREE.SphereGeometry(1.5, 32, 32);
        const head = new THREE.Mesh(headGeo, catMaterial);
        head.position.set(0, 2, 1.2);
        catGroup.add(head);

        // Orelhas
        const earGeo = new THREE.ConeGeometry(0.5, 1.5, 16);
        const ear1 = new THREE.Mesh(earGeo, catMaterial);
        ear1.position.set(-0.8, 3.2, 1);
        ear1.rotation.z = 0.2;
        catGroup.add(ear1);
        
        const ear2 = new THREE.Mesh(earGeo, catMaterial);
        ear2.position.set(0.8, 3.2, 1);
        ear2.rotation.z = -0.2;
        catGroup.add(ear2);

        // Olhos (esferas pretas)
        const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const eyeGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const eye1 = new THREE.Mesh(eyeGeo, eyeMaterial);
        eye1.position.set(-0.5, 2.3, 2.5);
        catGroup.add(eye1);
        
        const eye2 = new THREE.Mesh(eyeGeo, eyeMaterial);
        eye2.position.set(0.5, 2.3, 2.5);
        catGroup.add(eye2);

        // Focinho/Narizinho
        const noseMaterial = new THREE.MeshBasicMaterial({ color: 0xff99bb });
        const noseGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const nose = new THREE.Mesh(noseGeo, noseMaterial);
        nose.position.set(0, 1.9, 2.65);
        catGroup.add(nose);

        // Rabinho (Cilindro curvo ou reto na traseira)
        const tailGeo = new THREE.CylinderGeometry(0.25, 0.35, 3, 16);
        const tail = new THREE.Mesh(tailGeo, catMaterial);
        tail.position.set(0, 1, -2);
        tail.rotation.x = -Math.PI / 4;
        catGroup.add(tail);

        // Posicionando o gato inteirinho no topo do coração
        catGroup.position.set(0, 9.5, 0); 
        presentGroup.add(catGroup);

        // --- 3. Adicionando os Brilhos Amarelos ao Redor ---
        const sparkleCount = 600; 
        const sparklePositions = new Float32Array(sparkleCount * 3);
        const sparkleGeometry = new THREE.BufferGeometry();

        for (let i = 0; i < sparkleCount; i++) {
            const radius = 15; 
            const phi = Math.random() * Math.PI * 2;
            const theta = Math.random() * Math.PI;
            const r = radius * Math.sqrt(Math.random()); 

            sparklePositions[i * 3] = r * Math.sin(theta) * Math.cos(phi);
            sparklePositions[i * 3 + 1] = r * Math.sin(theta) * Math.sin(phi);
            sparklePositions[i * 3 + 2] = r * Math.cos(theta);
        }
        sparkleGeometry.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));

        const sparkleMaterial = new THREE.PointsMaterial({
            color: 0xffffcc,
            size: 0.15,
            transparent: true,
            blending: THREE.AdditiveBlending, 
            depthWrite: false 
        });
        const sparkles = new THREE.Points(sparkleGeometry, sparkleMaterial);
        presentGroup.add(sparkles);

        // --- 4. Iluminação ---
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(5, 10, 5);
        scene.add(light);
        
        // Uma segunda luz para iluminar o rosto do gatinho
        const frontLight = new THREE.DirectionalLight(0xffffff, 0.5);
        frontLight.position.set(0, 0, 10);
        scene.add(frontLight);
        
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);

        // --- 5. Câmera ---
        camera.position.z = 28; 
        camera.position.y = 5;
        camera.lookAt(0, 5, 0);

        // --- 6. Animação ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Faz o grupo girar
            presentGroup.rotation.y += 0.01; 
            
            // Leve movimento de flutuação
            presentGroup.position.y = Math.sin(Date.now() * 0.001) * 0.5;

            // Pulsação dos brilhos
            sparkleMaterial.size = 0.15 + Math.sin(Date.now() * 0.005) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        // --- 7. Responsividade ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
